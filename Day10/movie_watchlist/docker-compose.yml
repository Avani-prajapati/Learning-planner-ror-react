version: '3.8'

services:
  db:
    image: postgres:16
    container_name: watchlist_db
    environment:
      POSTGRES_USER: watchlist_user
      POSTGRES_PASSWORD: watchlist_pass
      POSTGRES_DB: watchlist_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: